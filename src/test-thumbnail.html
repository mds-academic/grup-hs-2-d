<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    font-family: 'Outfit', sans-serif;
    margin: 0;
    padding: 20px;
    background: #2a2a2a;
  }
  .custom-thumbnail {
    width: 800px;
    height: 450px;
    background-color: #f4f4f5;
    background-image: radial-gradient(#d4d4d8 2px, transparent 2px);
    background-size: 20px 20px;
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .thumb-card-blue-bg {
    position: absolute;
    width: 88%;
    height: 75%;
    background: #00c3ff;
    border-radius: 24px;
    border: 4px solid #1a1a1a;
    transform: translate(12px, 12px);
  }
  .thumb-card {
    position: relative;
    width: 88%;
    height: 75%;
    background: #ffffff;
    border-radius: 24px;
    border: 4px solid #1a1a1a;
    box-shadow: 8px 8px 0px #1a1a1a;
    display: flex;
    flex-direction: column;
    padding: 40px;
    box-sizing: border-box;
    justify-content: center;
    z-index: 10;
  }
  .thumb-kicker {
    align-self: flex-start;
    background: #ffe600;
    border: 3px solid #1a1a1a;
    border-radius: 16px;
    padding: 8px 24px;
    font-weight: 900;
    font-size: 20px;
    color: #1a1a1a;
    text-transform: uppercase;
    box-shadow: 3px 3px 0px #1a1a1a;
    margin-bottom: 24px;
  }
  .thumb-title {
    font-size: 46px;
    font-weight: 900;
    color: #1a1a1a;
    line-height: 1.2;
    max-width: 80%;
  }
  .thumb-decoration {
    position: absolute;
    right: 30px;
    bottom: 30px;
    width: 150px;
    height: 150px;
    opacity: 0.8;
  }
</style>
</head>
<body>
  <div class="custom-thumbnail">
    <div class="thumb-card-blue-bg"></div>
    <div class="thumb-card">
      <div class="thumb-kicker">MATERI 1</div>
      <div class="thumb-title">Bagaimana Program Bisa Memilih?</div>
      <svg class="thumb-decoration" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 50 L50 10 L90 50 L50 90 Z" fill="#ffe600" stroke="#1a1a1a" stroke-width="4" stroke-linejoin="round"/>
        <path d="M10 60 L50 100 L90 60" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linejoin="round"/>
        <path d="M50 100 L50 90" stroke="#1a1a1a" stroke-width="4"/>
        <path d="M10 60 L10 50" stroke="#1a1a1a" stroke-width="4"/>
        <path d="M90 60 L90 50" stroke="#1a1a1a" stroke-width="4"/>
      </svg>
    </div>
  </div>
</body>
</html>
